micronaut:
  application:
    name: micronaut-playground

template:
  prefix: "Test"

r2dbc:
  datasources:
    default:
      url: "r2dbc:h2:mem:///db?options=DB_CLOSE_DELAY=-1;"
      username: sa
      password: ""
      driverClassName: org.h2.Driver
      schema-generate: CREATE_DROP
      dialect: H2

jackson:
  serialization:
    write-dates-as-timestamps: false
